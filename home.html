<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المتابعة لحفظ القرآن الكريم</title>
    
    <link rel="stylesheet" href="file:///android_asset/icons.css">
    <!--<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap">-->
    <style>
        @font-face {
            font-family: 'Uthmani';
            src: url('file:///android_asset/uthmanic.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'Phosphor';
            src: url('file:///android_asset/Phosphor.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --header-bg: #1e3d33;
            --header-text: #ffffff;
            --accent-color: #16a085;
            --success-color: #27ae60;
            --very-good-color: #f1c40f;
            --warning-color: #e67e22;
            --danger-color: #c0392b;
            --border-color: #e2e8f0;
            --dialog-bg: #ffffff;
            --history-item-bg: #f8fafc;
            --student-bar-bg: #eaeded;
            --group-label-color: #16a085;
        }

        [data-theme="dark"] {
            --bg-color: #121824;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --header-bg: #0f172a;
            --header-text: #38bdf8;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --dialog-bg: #1e293b;
            --history-item-bg: #334155;
            --student-bar-bg: #1e293b;
            --group-label-color: #2980b9;
            --txt-c: #ffffff;
        }

        body {
            font-family: 'Amiri', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            transition: background-color 0.3s, color 0.3s;
        }

        .quran-font { font-family: 'Uthmani', 'Amiri', serif; }

        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto 15px auto;
            background: var(--header-bg);
            color: var(--header-text);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 8px; }

        .header-actions { 
            display: flex; 
            gap: 8px; 
            flex-wrap: wrap; 
            justify-content: center;
            width: 100%;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            white-space: nowrap;
            flex: 1 1 auto;
            max-width: 100%;
        }
        [data-theme="dark"] .btn { color: #0f172a; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background-color: #64748b; color: white !important; }
        .btn-danger { background-color: var(--danger-color); color: white !important; }
        .btn-info { background-color: #2980b9; color: white !important; }

        .student-management-bar {
            max-width: 1100px;
            margin: 0 auto 15px auto;
            background: var(--student-bar-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid var(--border-color);
        }

        .student-selector-zone {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .student-selector-zone label {
            font-weight: bold;
            white-space: nowrap;
            font-size: 15px;
        }

        select {
            padding: 10px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            outline: none;
            flex: 1 1 150px;
            min-width: 120px;
            font-family: inherit;
        }

        .student-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
        }

        .sections-tabs {
            max-width: 1100px;
            margin: 0 auto 15px auto;
            display: flex;
            gap: 6px;
        }

        .tab-btn {
            flex: 1;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: bold;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        [data-theme="dark"] .tab-btn.active { color: #0f172a; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 15px;
        }

        .juz-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
            border-right: 6px solid #cbd5e1;
        }

        .juz-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .juz-info { display: flex; flex-direction: column; gap: 4px; width: 65%; }
        .juz-number { font-size: 12px; color: #94a3b8; font-weight: bold; }
        .juz-name { font-weight: bold; font-size: 18px; line-height: 1.3; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; color: white !important; display: inline-block; text-align: center; white-space: nowrap; }
        .status-excellent { background-color: var(--success-color); }
        .status-very-good { background-color: var(--very-good-color); color: #000 !important; }
        .status-good { background-color: var(--warning-color); }
        .status-not-memorized { background-color: var(--danger-color); }
        .status-group-label { background-color: var(--group-label-color); }

        .juz-card.border-excellent { border-right-color: var(--success-color); }
        .juz-card.border-very-good { border-right-color: var(--very-good-color); }
        .juz-card.border-good { border-right-color: var(--warning-color); }
        .juz-card.border-not-memorized { border-right-color: var(--danger-color); }
        .juz-card.border-group-label { border-right-color: var(--group-label-color); }

        .last-score { font-size: 13px; color: #64748b; }
        [data-theme="dark"] .last-score { color: #94a3b8; }
        
        .confidence-level { font-size: 12px; font-weight: bold; margin-top: 2px; }
        
        .progress-text { font-size: 12px; font-weight: bold; margin-top: 2px; display: inline-flex; align-items: center; gap: 4px; }
        .prog-up-heavy { color: #27ae60; }
        .prog-up-medium { color: #1abc9c; }
        .prog-up-light { color: #2ecc71; }
        .prog-stable { color: #7f8c8d; }
        .prog-down-light { color: #e67e22; }
        .prog-down-medium { color: #d35400; }
        .prog-down-heavy { color: #c0392b; }

        dialog {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            padding: 20px;
            width: 95%;
            max-width: 450px;
            background: var(--dialog-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        dialog::backdrop { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
        dialog h2 { margin-top: 0; color: var(--accent-color); font-size: 20px; display: flex; align-items: center; gap: 6px; }

        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-weight: bold; font-size: 14px; }
        .form-group input {
            padding: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .dialog-actions .btn { flex: 1 1 auto; }

        .history-section { margin-top: 20px; max-height: 250px; overflow-y: auto; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .history-section h3 { display: flex; align-items: center; gap: 6px; font-size: 16px; margin-bottom: 10px; }
        .history-item {
            background: var(--history-item-bg);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent-color);
            border: 1px solid var(--border-color);
        }

        .no-students-alert {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            font-size: 16px;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .page-input-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            align-items: center;
        }

        @media (min-width: 768px) {
            body { padding: 20px; }
            header { flex-direction: row; padding: 15px 25px; text-align: right; }
            h1 { font-size: 24px; }
            .header-actions { width: auto; justify-content: flex-end; }
            .btn { flex: 0 1 auto; font-size: 15px; }
            .student-management-bar { flex-direction: row; justify-content: space-between; align-items: center; }
            .student-selector-zone { width: auto; }
            .student-actions { width: auto; }
            select { min-width: 200px; }
            dialog { padding: 25px; width: 90%; }
        }
    </style>
<style id="admin-styles">
        :root {
            --drawer-bg-light: #ffffff;
            --drawer-text-light: #333333;
            --drawer-bg: var(--drawer-bg-light);
            --drawer-text: var(--drawer-text-light);
        }
        [data-user-theme="dark"] {
            --drawer-bg-dark: #1e1e1e;
            --drawer-text-dark: #e0e0e0;
            --drawer-bg: var(--drawer-bg-dark);
            --drawer-text: var(--drawer-text-dark);
        }
        * {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
        }
        body { margin: 0 !important; padding: 0 !important; padding-top: 56px !important; }
        header { position: fixed; top: 0; left: 0; z-index: 1000; background: var(--drawer-bg); height: 56px !important; line-height: 56px !important; padding: 0 15px !important; color: var(--drawer-text); display: flex; align-items: center; justify-content: space-between; width: 100% !important; max-width: 100% !important; min-width: 100% !important; box-sizing: border-box; direction: rtl; gap: 15px; overflow: hidden !important; transition: background-color 0.3s, color 0.3s; }
        .header-brand { display: flex; align-items: center; gap: 15px; width: auto; text-align: right; }
        
        .menu-btn-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            box-sizing: border-box;
            transition: transform 0.15s ease;
            margin-top: auto;
            margin-bottom: auto;
        }
        .menu-btn-container:active {
            transform: scale(0.85);
        }
        .menu-bar-line {
            width: 100%;
            height: 3px;
            background-color: var(--drawer-text);
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-origin: right center;
        }
        .menu-btn-container.active-icon .menu-bar-line:nth-child(1) {
            transform: rotate(-45deg);
        }
        .menu-btn-container.active-icon .menu-bar-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .menu-btn-container.active-icon .menu-bar-line:nth-child(3) {
            transform: rotate(45deg);
        }
        
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; display: none; }
        .drawer { position: fixed; top: 0; width: 280px; height: 100%; background: var(--drawer-bg); color: var(--drawer-text); z-index: 1002; transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); display: flex; flex-direction: column; right: -280px; }
        .drawer.open { right: 0; }
        .drawer-header { background: var(--drawer-bg); color: var(--drawer-text); height: 56px !important; line-height: 56px !important; padding: 0 15px !important; font-weight: bold; text-align: right; box-sizing: border-box; overflow: hidden !important; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .drawer-menu-container { flex: 1; overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .drawer-menu-container::-webkit-scrollbar { display: none; }
        .drawer-menu { list-style: none; padding: 10px 0; margin: 0; direction: rtl; }
        .drawer-item { padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--drawer-text); transition: all 0.2s ease; outline: none; -webkit-tap-highlight-color: transparent; }
        .drawer-item:hover { background-color: rgba(0,0,0,0.05); transform: translateX(-4px); }
        .drawer-item:active { background-color: rgba(0,0,0,0.1) !important; transform: scale(0.98) !important; transition: transform 0.05s ease; }
        .drawer-loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--drawer-text); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
.dl123 {
    background: transparent; border: none; color: var(--drawer-text); cursor: pointer;
    font-size: 1.2rem; width: 38px; height: 38px; border-radius: 8px; display: inline-flex;
    align-items: center; justify-content: center; transition: background-color 0.2s, transform 0.1s;
    border: 1px solid rgba(255, 255, 255, 0.15); appearance: none; box-sizing: border-box;
}
.dl123:hover { background-color: rgba(0,0,0,0.08); }
.dl123:active { transform: scale(0.9); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<!-- START ADMIN DRAWER -->
<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button class="menu-btn-container" id="menuBtnToggle" onclick="toggleDrawer()">
            <div class="menu-bar-line"></div>
            <div class="menu-bar-line"></div>
            <div class="menu-bar-line"></div>
        </button>
        <span id="pageMainHeader" style="font-weight:bold; font-size: 1.1rem; display: inline-block; vertical-align: middle;">home</span>
    </div>
    <div class="dl123" id="userThemeToggleBtn" onclick="toggleUserTheme()"><i class="fa-solid fa-moon"></i></div>
</header>
<div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>
<nav class="drawer" id="drawer">
    <div class="drawer-header" id="drawerSideHeader">home</div>
    <div id="drawerLoader" class="drawer-loader"></div>
    <div class="drawer-menu-container">
        <ul class="drawer-menu" id="drawerDynamicMenu"></ul>
    </div>
</nav>
<!-- END ADMIN DRAWER -->

    <header>
        <h1><i class="ph ph-book-open"></i> سجل المتابعة لحفظ القرآن</h1>
        <div class="header-actions">
            <button class="btn btn-info" onclick="exportData()"><i class="ph ph-download-simple"></i> تصدير نسخة احتياطية</button>
            <button class="btn btn-info" onclick="triggerImport()"><i class="ph ph-upload-simple"></i> استيراد نسخة احتياطية</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;" onchange="importData(event)">
            
            <button class="btn btn-secondary" id="sortBtn" onclick="toggleSortOrder()"><i class="ph ph-sort-ascending"></i> ترتيب: تصاعدي</button>
            <button class="btn btn-secondary" id="themeBtn" onclick="toggleTheme()"><i class="ph ph-moon"></i> مظهر داكن</button>
            <button class="btn" onclick="openSettings()"><i class="ph ph-gear"></i> الإعدادات والحلقات</button>
        </div>
    </header>

    <div class="student-management-bar">
        <div class="student-selector-zone">
            <label>اختر الطالب:</label>
            <select id="studentSelect" onchange="onStudentChanged()">
            </select>
        </div>
        <div class="student-actions">
            <button class="btn btn-secondary" onclick="renameStudent()"><i class="ph ph-pencil-simple"></i> تعديل الاسم</button>
            <button class="btn btn-danger" onclick="deleteStudent()"><i class="ph ph-trash"></i> حذف الطالب</button>
            <button class="btn" style="background-color: #27ae60;" onclick="addNewStudent()"><i class="ph ph-plus"></i> إضافة طالب</button>
        </div>
    </div>

    <div class="sections-tabs">
        <button class="tab-btn active" id="tabAjza" onclick="switchTab('ajza')">الأجزاء</button>
        <button class="tab-btn" id="tabAhzab" onclick="switchTab('ahzab')">الأحزاب</button>
        <button class="tab-btn" id="tabSuwar" onclick="switchTab('suwar')">السور</button>
    </div>

    <div style="max-width:1100px; margin: 0 auto 15px auto; display:none;" id="groupEvalContainer">
        <button class="btn" style="color: #ffffff; background-color: var(--group-label-color); width:100%;" onclick="openGroupEvaluation()"><i class="ph ph-plus"></i> تسميع مخصص</button>
    </div>

    <div class="container" id="juzContainer">
    </div>

    <dialog id="settingsDialog">
        <h2><i class="ph ph-gear"></i> إعدادات خصم درجات التقييم</h2>
        <div class="form-group">
            <label for="errorDeduction">الخصم لكل خطأ واحد (درجة):</label>
            <input type="number" id="errorDeduction" step="0.1" min="0" value="1.0">
        </div>
        <div class="form-group">
            <label for="doubtDeduction">الخصم لكل شكين (درجة):</label>
            <input type="number" id="doubtDeduction" step="0.1" min="0" value="1.0">
        </div>
        <div class="form-group">
            <label for="tajweedDeduction">الخصم لكل خطأ تجويد (درجة):</label>
            <input type="number" id="tajweedDeduction" step="0.05" min="0" value="0.25">
        </div>
        <div class="form-group">
            <label for="confidenceDeduction">خصم مستوى الثقة لكل تردد واحد (%):</label>
            <input type="number" id="confidenceDeduction" step="1" min="0" max="100" value="5">
        </div>
        
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">
        <h3><i class="ph ph-users-three"></i> إدارة الحلقات</h3>
        
        <div class="form-group">
            <label for="groupSelect">الحلقة الحالية النشطة:</label>
            <select id="groupSelect" onchange="onGroupChanged()" style="width: 100%; box-sizing: border-box;"></select>
        </div>

        <div class="dialog-actions" style="margin-top: 10px; justify-content: flex-start;">
            <button class="btn" style="background-color: #27ae60;" onclick="addNewGroup()"><i class="ph ph-plus"></i> إضافة حلقة</button>
            <button class="btn btn-secondary" onclick="renameGroup()"><i class="ph ph-pencil-simple"></i> تغيير الاسم</button>
            <button class="btn btn-danger" onclick="deleteGroup()"><i class="ph ph-trash"></i> حذف الحلقة</button>
        </div>

        <div class="dialog-actions">
            <button class="btn btn-secondary" onclick="closeDialog('settingsDialog')">إلغاء</button>
            <button class="btn" onclick="saveSettings()">حفظ الإعدادات</button>
        </div>
    </dialog>

    <dialog id="evaluationDialog">
        <h2><i class="ph ph-note-pencil"></i> <span id="evalDialogTitle" class="quran-font">تقييم الحفظ</span></h2>
        
        <div id="surahVersesBlock" style="display: none; border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; margin-bottom: 12px; background: var(--history-item-bg);">
            <div class="form-group">
                <label for="surahScopeType">نطاق التسميع:</label>
                <select id="surahScopeType" onchange="onSurahScopeTypeChanged()">
                    <option value="all">سورة كاملة</option>
                    <option value="verses">تحديد آيات</option>
                </select>
            </div>
            <div id="versesPickers" style="display: none; gap: 10px; margin-top: 10px;">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="verseStart">من آية:</label>
                    <select id="verseStart" onchange="onVerseStartChanged()"></select> 
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label for="verseEnd">إلى آية:</label>
                    <select id="verseEnd"></select> 
                </div>
            </div>

            <!-- إضافة تحديد الصفحات ذات الإشكال لقسم السور -->
            <div style="margin-top: 12px; border-top: 1px dashed var(--border-color); padding-top: 8px;">
                <label style="font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="enableProblemPages" onchange="toggleProblemPages()">
                    تحديد الصفحات التي بها إشكال
                </label>
                <div id="problemPagesContainer" style="display: none; margin-top: 8px;">

        function areSurahsArraysEqual(arr1, arr2) {
            if (!Array.isArray(arr1) || !Array.isArray(arr2)) return false;
            if (arr1.length !== arr2.length) return false;
            const s1 = [...arr1].sort();
            const s2 = [...arr2].sort();
            return s1.every((val, index) => val === s2[index]);
        }

        function getSurahRangeArray(startIdx, endIdx) {
            let list = [];
            let min = Math.min(startIdx, endIdx);
            let max = Math.max(startIdx, endIdx);
            for (let i = min; i <= max; i++) {
                list.push(i);
            }
            return list;
        }

        function isShortSurah(index) {
            return index >= 82 && index <= 114;
        }

        function calculateProgressText(attempts) {
            if (!attempts || attempts.length <= 1) {
                return '<span class="progress-text" style="color:#aaa; font-weight:normal;">(المرة الأولى - لا مقارنات)</span>';
            }
            
            const currentAttempt = attempts[attempts.length - 1];
            let previousAttempt = null;
            let relationType = 'none';

            for (let i = attempts.length - 2; i >= 0; i--) {
                const att = attempts[i];
                
                if (currentSelectedTab === 'suwar') {
                    if (currentAttempt.isGroup && att.isGroup) {
                        previousAttempt = att;
                        break;
                    } else if (!currentAttempt.isGroup && !att.isGroup) {
                        const currentType = currentAttempt.scopeType || 'all';
                        const attType = att.scopeType || 'all';
                        
                        if (currentType === attType) {
                            if (currentType === 'verses') {
                                if (currentAttempt.verseStart === att.verseStart && currentAttempt.verseEnd === att.verseEnd) {
                                    previousAttempt = att;
                                    break;
                                }
                            } else {
                                previousAttempt = att;
                                break;
                            }
                        }
                    }
                } else {
                    const currentType = currentAttempt.scopeType || 'all';
                    const attType = att.scopeType || 'all';

                    if (currentType === 'all' && attType === 'all') {
                        previousAttempt = att;
                        break;
                    }
                    else if (currentType === 'unmemorized' && attType === 'unmemorized') {
                        if (areSurahsArraysEqual(currentAttempt.unmemorizedSurahs, att.unmemorizedSurahs)) {
                            previousAttempt = att;
                            break;
                        }
                    }
                    else if (attType === 'unmemorized' && currentType === 'all') {
                        previousAttempt = att;
                        relationType = 'toAll';
                        break;
                    }
                    else if (attType === 'all' && currentType === 'unmemorized') {
                        previousAttempt = att;
                        relationType = 'toUnmemorized';
                        break;
                    }
                }
            }

            if (!previousAttempt) {
                return '<span class="progress-text" style="color:#aaa; font-weight:normal;">(لا مقارنات عادلة متوفرة)</span>';
            }
            
            let currentScoreForCalc = currentAttempt.score;
            let previousScoreForCalc = previousAttempt.score;

            if (currentSelectedTab === 'suwar' && currentAttempt.isGroup && previousAttempt.isGroup) {
                const curRange = getSurahRangeArray(currentAttempt.startSurahIdx, currentAttempt.endSurahIdx);
                const prevRange = getSurahRangeArray(previousAttempt.startSurahIdx, previousAttempt.endSurahIdx);
                
                let isIdentical = curRange.length === prevRange.length && curRange.every((v, idx) => v === prevRange[idx]);
                
                if (!isIdentical) {
                    let hiddenBonus = 0;
                    curRange.forEach(sIdx => {
                        if (!prevRange.includes(sIdx)) {
                            hiddenBonus += isShortSurah(sIdx) ? 0.5 : 2.0;
                        }
                    });
                    prevRange.forEach(sIdx => {
                        if (!curRange.includes(sIdx)) {
                            hiddenBonus -= isShortSurah(sIdx) ? 0.5 : 2.0;
                        }
                    });
                    currentScoreForCalc += hiddenBonus;
                }
            } else {
                if (relationType === 'toAll') {
                    let unmemorizedCount = 0;
                    if (previousAttempt.unmemorizedSurahs && Array.isArray(previousAttempt.unmemorizedSurahs)) {
                        unmemorizedCount = previousAttempt.unmemorizedSurahs.length;
                    }
                    const hiddenBonus = unmemorizedCount * 2;
                    currentScoreForCalc += hiddenBonus;
                } 
                else if (relationType === 'toUnmemorized') {
                    let currentUnmemorizedCount = 0;
                    if (currentAttempt.unmemorizedSurahs && Array.isArray(currentAttempt.unmemorizedSurahs)) {
                        currentUnmemorizedCount = currentAttempt.unmemorizedSurahs.length;
                    }
                    const hiddenPenalty = currentUnmemorizedCount * 2;
                    currentScoreForCalc -= hiddenPenalty;
                }
            }

            const diff = currentScoreForCalc - previousScoreForCalc;

            if (diff === 0) {
                return '<span class="progress-text prog-stable">لم يتغير <i class="ph ph-minus"></i></span>';
            } else if (diff > 0) {
                if (diff <= 2) return '<span class="progress-text prog-up-light">تحسن قليلاً <i class="ph ph-trend-up"></i></span>';
                if (diff <= 4) return '<span class="progress-text prog-up-medium">تحسن نوعاً ما <i class="ph ph-sparkle"></i></span>';
                return '<span class="progress-text prog-up-heavy">تحسن كثيراً <i class="ph ph-fire"></i></span>';
            } else {
                const absDiff = Math.abs(diff);
                if (absDiff <= 2) return '<span class="progress-text prog-down-light">ساء قليلاً <i class="ph ph-trend-down"></i></span>';
                if (absDiff <= 4) return '<span class="progress-text prog-down-medium">ساء نوعاً ما <i class="ph ph-warning"></i></span>';
                return '<span class="progress-text prog-down-heavy">ساء كثيراً <i class="ph ph-warning-octagon"></i></span>';
            }
        }

        function renderList() {
            const container = document.getElementById('juzContainer');
            container.innerHTML = '';

            if (!currentStudentId || studentsList.length === 0 || studentsList.filter(s => (s.groupId || 'group_default') === currentGroupId).length === 0) {
                container.innerHTML = '<div class="no-students-alert"><i class="ph ph-warning"></i> لا يوجد طلاب مضافون حالياً في هذه الحلقة. يرجى الضغط على "إضافة طالب" للبدء.</div>';
                return;
            }

            const student = getCurrentStudentData();
            let targetData, namesArray, totalCount, prefixLabel;
            
            if (currentSelectedTab === 'ahzab') {
                targetData = student.data; namesArray = juzNames; totalCount = 60; prefixLabel = "الحزب";
            } else if (currentSelectedTab === 'suwar') {
                targetData = student.surahData; namesArray = surahNames; totalCount = 114; prefixLabel = "سورة";
            } else {
                targetData = student.ajzaData; namesArray = ajzaNames; totalCount = 30; prefixLabel = "الجزء";
            }

            let indexes = [];
            for (let i = 1; i <= totalCount; i++) indexes.push(i);
            if (sortOrder === 'desc') indexes.reverse();

            indexes.forEach(i => {
                const card = document.createElement('div');
                card.className = 'juz-card';
                card.onclick = () => openEvaluation(i);

                let statusHTML = '<span style="color:#888; font-size:14px;">لم يُسمّع</span>';
                let scoreHTML = '';
                let borderClass = '';
                let versesScopeHTML = ''; 
                let unmemorizedHTML = ''; 
                let problemPagesHTML = '';
                
                if (targetData[i] && targetData[i].length > 0) {
                    const attempts = targetData[i];
                    const lastAttempt = attempts[attempts.length - 1];
                    const score = lastAttempt.score;
                    
                    if (currentSelectedTab === 'suwar' && !lastAttempt.isGroup && lastAttempt.scopeType === 'verses' && lastAttempt.verseStart && lastAttempt.verseEnd) {
                        versesScopeHTML = `<div style="color: #2980b9; font-weight: bold; font-size: 13px; margin-top: 2px;">من ${lastAttempt.verseStart} إلى ${lastAttempt.verseEnd}</div>`;
                    }

                    if (currentSelectedTab === 'suwar' && lastAttempt.problemPages && lastAttempt.problemPages.length > 0) {
                        problemPagesHTML = `<div style="color: var(--danger-color); font-weight: bold; font-size: 12px; margin-top: 2px;">الصفحات التي بها إشكال: ${lastAttempt.problemPages.join('، ')}</div>`;
                    }

                    if ((currentSelectedTab === 'ajza' || currentSelectedTab === 'ahzab') && lastAttempt.scopeType === 'unmemorized' && lastAttempt.unmemorizedSurahs && lastAttempt.unmemorizedSurahs.length > 0) {
                        unmemorizedHTML = `<div style="color: var(--danger-color); font-weight: bold; font-size: 13px; margin-top: 2px;">بإستثناء: ${lastAttempt.unmemorizedSurahs.join('، ')} (لم يحفظ)</div>`;
                    }

                    let badgeClass = '';
                    let statusText = '';
                    let confidenceSectionHTML = '';
                    let progressHTML = '';

                    if (currentSelectedTab === 'suwar' && lastAttempt.isGroup) {
                        badgeClass = 'status-group-label';
                        borderClass = 'border-group-label';
                        statusText = lastAttempt.groupRangeText;
                        confidenceSectionHTML = `<div class="confidence-level" style="color: #27ae60;"><i class="ph ph-shield-check"></i> مستوى الثقة للمجموعة : 100%</div>`;
                        progressHTML = '';
                    } else {
                        const hesitations = lastAttempt.hesitations || 0;
                        const deductionPerHesitation = settings.confidenceDeduction !== undefined ? settings.confidenceDeduction : 5;
                        let confidenceScore = 100 - (hesitations * deductionPerHesitation);
                        if (confidenceScore < 0) confidenceScore = 0;

                        let confidenceColor = '#27ae60';
                        if (confidenceScore >= 75 && confidenceScore <= 100) {
                            confidenceColor = '#27ae60';
                        } else if (confidenceScore >= 50 && confidenceScore < 75) {
                            confidenceColor = '#f1c40f';
                        } else if (confidenceScore >= 25 && confidenceScore < 50) {
                            confidenceColor = '#e67e22';
                        } else {
                            confidenceColor = '#c0392b';
                        }

                        if (score > 7.5) { badgeClass = 'status-excellent'; borderClass = 'border-excellent'; statusText = 'ممتاز'; }
                        else if (score > 5.0) { badgeClass = 'status-very-good'; borderClass = 'border-very-good'; statusText = 'جيد جداً'; }
                        else if (score > 2.5) { badgeClass = 'status-good'; borderClass = 'border-good'; statusText = 'جيد'; }
                        else { badgeClass = 'status-not-memorized'; borderClass = 'border-not-memorized'; statusText = 'لم يحفظ'; }

                        confidenceSectionHTML = `<div class="confidence-level" style="color: ${confidenceColor};"><i class="ph ph-shield-check"></i> مستوى الثقة: ${confidenceScore}%</div>`;
                        progressHTML = calculateProgressText(attempts);
                    }

                    card.classList.add(borderClass);
                    statusHTML = `<span class="status-badge ${badgeClass}">${statusText}</span>`;
                    
                    scoreHTML = `
                        <span class="last-score">آخر تقييم: ${score}/10 (المحاولات: ${attempts.length})</span>
                        ${versesScopeHTML}
                        ${problemPagesHTML}
                        ${unmemorizedHTML}
                        ${confidenceSectionHTML}
                        ${progressHTML}
                    `;
                }

                const numLabel = (currentSelectedTab === 'ajza') ? `الجزء ${i}` : `${prefixLabel} ${i}`;

                card.innerHTML = `
                    <div class="juz-info">
                        <span class="juz-number">${numLabel}</span>
                        <span class="juz-name quran-font">${namesArray[i-1]}</span>
                        ${scoreHTML}
                    </div>
                    <div>${statusHTML}</div>
                `;
                container.appendChild(card);
            });
        }

        function onVerseStartChanged() {
            const startVal = parseInt(document.getElementById('verseStart').value) || 1;
            const endSelect = document.getElementById('verseEnd');
            const totalVerses = surahVersesCount[currentSelectedIndex - 1];
            const currentEndVal = parseInt(endSelect.value);

            endSelect.innerHTML = '';
            for (let v = startVal; v <= totalVerses; v++) {
                const opt = document.createElement('option');
                opt.value = v;
                opt.innerText = v;
                endSelect.appendChild(opt);
            }

            if (currentEndVal >= startVal && currentEndVal <= totalVerses) {
                endSelect.value = currentEndVal;
            }
        }

        function saveEvaluation() {
            const errors = parseInt(document.getElementById('errorsCount').value) || 0;
            const doubts = parseInt(document.getElementById('doubtsCount').value) || 0;
            const hesitations = parseInt(document.getElementById('hesitationsCount').value) || 0;
            const tajweedErrors = parseInt(document.getElementById('tajweedCount').value) || 0;

            let totalDeduction = errors * settings.errorDeduction;
            totalDeduction += (doubts / 2) * settings.doubtDeduction; 
            totalDeduction += tajweedErrors * (settings.tajweedDeduction || 0.25);

            let finalScore = 10 - totalDeduction;
            if (finalScore < 0) finalScore = 0;
            finalScore = Math.round(finalScore * 10) / 10;

            const student = studentsList.find(s => s.id === currentStudentId);
            
            if (!student.data) student.data = {};
            if (!student.surahData) student.surahData = {};
            if (!student.ajzaData) student.ajzaData = {};

            let targetData;
            if (currentSelectedTab === 'ahzab') targetData = student.data;
            else if (currentSelectedTab === 'suwar') targetData = student.surahData;
            else targetData = student.ajzaData;

            if (!targetData[currentSelectedIndex]) targetData[currentSelectedIndex] = [];
            const actualAttemptNumber = targetData[currentSelectedIndex].length + 1;

            // تحديد تاريخ المحاولة
            let evalDate = new Date().toLocaleDateString('ar-EG');
            if (document.getElementById('enablePreviousDate').checked) {
                const customVal = document.getElementById('customEvalDate').value;
                if (customVal) {
                    const d = new Date(customVal);
                    evalDate = d.toLocaleDateString('ar-EG');
                }
            }

            const attempt = {
                attemptNumber: actualAttemptNumber,
                date: evalDate,
                errors: errors,
                doubts: doubts,
                hesitations: hesitations,
                tajweedErrors: tajweedErrors,
                score: finalScore
            };

            if (currentSelectedTab === 'suwar') {
                const scopeType = document.getElementById('surahScopeType').value;
                attempt.scopeType = scopeType;
                if (scopeType === 'verses') {
                    attempt.verseStart = parseInt(document.getElementById('verseStart').value);
                    attempt.verseEnd = parseInt(document.getElementById('verseEnd').value);
                }

                // حفظ الصفحات التي بها مشكلة إن وجدت
                if (document.getElementById('enableProblemPages').checked) {
                    const pageInputs = document.querySelectorAll('.problem-page-input');
                    const pages = [];
                    pageInputs.forEach(input => {
                        const val = parseInt(input.value);
                        if (val && !isNaN(val)) pages.push(val);
                    });
                    if (pages.length > 0) {
                        attempt.problemPages = pages;
                    }
                }
            } 
            else if (currentSelectedTab === 'ajza' || currentSelectedTab === 'ahzab') {
                const scopeType = document.getElementById('juzAhzabScopeType').value;
                attempt.scopeType = scopeType;
                if (scopeType === 'unmemorized') {
                    const multiSelect = document.getElementById('unmemorizedSurahs');
                    const selectedSurahs = Array.from(multiSelect.selectedOptions).map(option => option.value);
                    attempt.unmemorizedSurahs = selectedSurahs;
                }
            }

            targetData[currentSelectedIndex].push(attempt);
            saveStudentsToStorage();

            renderList();
            displayHistory(currentSelectedIndex);
            closeDialog('evaluationDialog');
            sendDataToSketchware("EVALUATION_SAVED");
        }

        function saveGroupEvaluation() {
            const startIdx = parseInt(document.getElementById('groupSurahStart').value);
            const endIdx = parseInt(document.getElementById('groupSurahEnd').value);
            const errors = parseInt(document.getElementById('groupErrorsCount').value) || 0;
            const doubts = parseInt(document.getElementById('groupDoubtsCount').value) || 0;
            const hesitations = parseInt(document.getElementById('groupHesitationsCount').value) || 0;
            const tajweedErrors = parseInt(document.getElementById('groupTajweedCount').value) || 0;

            let totalDeduction = errors * settings.errorDeduction;
            totalDeduction += (doubts / 2) * settings.doubtDeduction;
            totalDeduction += tajweedErrors * settings.tajweedDeduction;

            let finalScore = 10 - totalDeduction;
            if (finalScore < 0) finalScore = 0;
            finalScore = Math.round(finalScore * 10) / 10;

            const startName = surahNames[startIdx - 1];
            const endName = surahNames[endIdx - 1];

            const student = studentsList.find(s => s.id === currentStudentId);
            if (!student.surahData) student.surahData = {};

            let rangeSurahs = getSurahRangeArray(startIdx, endIdx);

            rangeSurahs.forEach(sIdx => {
                if (!student.surahData[sIdx]) student.surahData[sIdx] = [];
                const actualAttemptNumber = student.surahData[sIdx].length + 1;

                const attempt = {
                    attemptNumber: actualAttemptNumber,
                    date: new Date().toLocaleDateString('ar-EG'),
                    errors: errors,
                    doubts: doubts,
                    hesitations: hesitations,
                    tajweedErrors: tajweedErrors,
                    score: finalScore,
                    isGroup: true,
                    groupRangeText: `${startName} - ${endName}`,
                    startSurahIdx: startIdx,
                    endSurahIdx: endIdx
                };

                student.surahData[sIdx].push(attempt);
            });

            saveStudentsToStorage();
            renderList();
            closeDialog('groupEvaluationDialog');
            sendDataToSketchware("EVALUATION_SAVED");
        }

        function displayHistory(index) {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            const student = getCurrentStudentData();
            let targetData;
            if (currentSelectedTab === 'ahzab') targetData = student.data;
            else if (currentSelectedTab === 'suwar') targetData = student.surahData;
            else targetData = student.ajzaData;

            if (!targetData[index] || targetData[index].length === 0) {
                historyList.innerHTML = '<p style="color:#aaa; font-size:14px;">لا توجد محاولات مسجلة سابقاً.</p>';
                return;
            }

            const allAttempts = targetData[index];
            const reversedAttempts = [...allAttempts].reverse();

            reversedAttempts.forEach((attempt) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                
                let numText = `المرة (${attempt.attemptNumber})`;
                if (attempt.attemptNumber === 1) numText = "المرة الأولى";
                else if (attempt.attemptNumber === 2) numText = "المرة الثانية";
                else if (attempt.attemptNumber === 3) numText = "المرة الثالثة";
                else if (attempt.attemptNumber === 4) numText = "المرة الرابعة";

                const originalIndex = attempt.attemptNumber - 1;
                const tajweedVal = attempt.tajweedErrors !== undefined ? attempt.tajweedErrors : 0;

                let scopeText = "";
                let isGroupStyle = "";
                let scoreTextDisplay = `${attempt.score}/10`;

                let score = attempt.score;
                let statusText = '';
                if (score > 7.5) statusText = 'ممتاز';
                else if (score > 5.0) statusText = 'جيد جداً';
                else if (score > 2.5) statusText = 'جيد';
                else statusText = 'ضعيف';

                if (currentSelectedTab === 'suwar' && attempt.isGroup) {
                    isGroupStyle = `style="color: var(--group-label-color);"`;
                    scoreTextDisplay = "";
                    numText = `مجموعة : ${attempt.groupRangeText}`;
                    scopeText = ` | التقييم الرقمي: ${attempt.score}/10 | ${statusText}`;
                } else {
                    if (currentSelectedTab === 'suwar' && attempt.scopeType === 'verses' && attempt.verseStart && attempt.verseEnd) {
                        scopeText = ` | الآيات: من ${attempt.verseStart} إلى ${attempt.verseEnd}`;
                    } 
                    else if ((currentSelectedTab === 'ajza' || currentSelectedTab === 'ahzab') && attempt.scopeType === 'unmemorized' && attempt.unmemorizedSurahs && attempt.unmemorizedSurahs.length > 0) {
                        scopeText = ` | دون سورة: ${attempt.unmemorizedSurahs.join('، ')}`;
                    }

                    if (currentSelectedTab === 'suwar' && attempt.problemPages && attempt.problemPages.length > 0) {
                        scopeText += ` | صفحات بإشكال: ${attempt.problemPages.join('، ')}`;
                    }
                }

                item.innerHTML = `
                    <div style="flex-grow: 1;">
                        <strong ${isGroupStyle}>${numText}</strong> <small style="opacity:0.7">(${attempt.date})</small><br>
                        <span style="font-size:11px; opacity:0.9;">
                            الأخطاء: ${attempt.errors} | الترددات: ${attempt.hesitations} | الشكوك: ${attempt.doubts} | التجويد: ${tajweedVal}${scopeText}
                        </span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="font-weight:bold; font-size:16px; color: var(--accent-color);">
                            ${scoreTextDisplay}
                        </div>
                        <button class="btn btn-danger" style="padding: 2px 6px; font-size: 11px; border-radius: 4px;" 
                                onclick="deleteSpecificAttempt(${index}, ${originalIndex})"><i class="ph ph-trash"></i></button>
                    </div>
                `;
                historyList.appendChild(item);
            });
        }

        function deleteSpecificAttempt(itemIndex, attemptArrayId) {
            if (!confirm("هل أنت متأكد من حذف هذه المحاولة المحددة?")) return;

            const student = studentsList.find(s => s.id === currentStudentId);
            let targetData;
            if (currentSelectedTab === 'ahzab') targetData = student.data;
            else if (currentSelectedTab === 'suwar') targetData = student.surahData;
            else targetData = student.ajzaData;

            if (targetData[itemIndex]) {
                targetData[itemIndex].splice(attemptArrayId, 1);

                targetData[itemIndex].forEach((attempt, newIdx) => {
                    attempt.attemptNumber = newIdx + 1;
                });

                if (targetData[itemIndex].length === 0) {
                    delete targetData[itemIndex];
                }

                saveStudentsToStorage();
                renderList();
                displayHistory(itemIndex);

                alert("تم حذف التسميع بنجاح وإعادة ترتيب مرات التسميع المتبقية تلقائيا");
                sendDataToSketchware("EVALUATION_DELETED");
            }
        }

        function renameStudent() {
            if (!currentStudentId) return;
            const student = studentsList.find(s => s.id === currentStudentId);
            const newName = prompt(`تعديل اسم الطالب الحالي:`, student.name);
            if (!newName || newName.trim() === "") return;
            
            student.name = newName.trim();
            saveStudentsToStorage();
            updateStudentSelectOptions();
            sendDataToSketchware("STUDENT_RENAMED");
        }

        function deleteStudent() {
            if (!currentStudentId) return;
            const student = studentsList.find(s => s.id === currentStudentId);
            if (!confirm(`هل أنت متأكد من حذف الطالب (${student.name}) وجميع سجلات تسميعه بشكل نهائي?`)) return;
            
            studentsList = studentsList.filter(s => s.id !== currentStudentId);
            
            const filteredStudents = studentsList.filter(s => (s.groupId || 'group_default') === currentGroupId);
            currentStudentId = filteredStudents.length > 0 ? filteredStudents[0].id : null;
            
            saveStudentsToStorage();
            updateStudentSelectOptions();
            renderList();
            sendDataToSketchware("STUDENT_DELETED");
        }

        function exportData() {
            const backupData = {
                groups: localStorage.getItem('quran_groups_list'),
                currentGroupId: localStorage.getItem('quran_current_group_id'),
                students: localStorage.getItem('quran_students_list'),
                currentId: localStorage.getItem('quran_current_student_id'),
                settings: localStorage.getItem('quran_teacher_settings')
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "quran_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
            sendDataToSketchware("DATA_EXPORTED");
        }

        document.getElementById('juzContainer').addEventListener('click', function(){});

        function triggerImport() {
            document.getElementById('importFileInput').click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    if (importedData.students) {
                        if (confirm("هل أنت متأكد من استيراد هذه النسخة? سيتم استبدال جميع بيانات الحلقات والطلاب الحالية بالأحزاب والسور والأجزاء.")) {
                            if (importedData.groups) localStorage.setItem('quran_groups_list', importedData.groups);
                            if (importedData.currentGroupId) localStorage.setItem('quran_current_group_id', importedData.currentGroupId);
                            localStorage.setItem('quran_students_list', importedData.students);
                            if (importedData.currentId) localStorage.setItem('quran_current_student_id', importedData.currentId);
                            if (importedData.settings) localStorage.setItem('quran_teacher_settings', importedData.settings);
                            
                            alert("تم استعادة البيانات بنجاح!");
                            loadSettings();
                            loadGroupsData();
                            loadStudentsData();
                            sendDataToSketchware("DATA_IMPORTED");
                        }
                    } else {
                        alert("عذراً، هذا الملف غير صالح.");
                    }
                } catch (err) {
                    alert("حدث خطأ أثناء قراءة الملف.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        const menuBtn = document.getElementById("menuBtnToggle");
        
        drawer.classList.toggle("open");
        
        if(drawer.classList.contains("open")) {
            overlay.style.display = "block";
            menuBtn.classList.add("active-icon");
        } else {
            overlay.style.display = "none";
            menuBtn.classList.remove("active-icon");
        }
    }

    function renderDrawerContent(orderedPages) {
        const drawerMenu = document.getElementById("drawerDynamicMenu");
        drawerMenu.innerHTML = "";
        const currentPageData = orderedPages.find(p => p.file === currentFileName);
        if (currentPageData && currentPageData.title) {
            document.getElementById("pageMainHeader").innerText = currentPageData.title;
            if(document.getElementById("drawerSideHeader")) document.getElementById("drawerSideHeader").innerText = currentPageData.title;
            if(document.getElementById("pageContentTitle")) document.getElementById("pageContentTitle").innerText = currentPageData.title;
            document.title = currentPageData.title;
        }
        orderedPages.forEach(page => {
            const li = document.createElement("li");
            li.className = "drawer-item";
            li.innerHTML = "<span>" + page.title + "</span>";
            li.onclick = () => {
                if (typeof Android !== "undefined" && Android.openLocalPage) {
                    Android.openLocalPage(page.file);
                } else {
                    window.location.href = page.file;
                }
            };
            drawerMenu.appendChild(li);
        });
    }

    async function loadGlobalVars() {
        try {
            const res = await fetch("var.json");
            if(res.ok) {
                const data = await res.json();
                const styleEl = document.createElement("style");
                let cssStr = ":root {\n";
                for(let k in data.light) { cssStr += `  ${k}: ${data.light[k]};\n`; }
                cssStr += "}\n[data-user-theme='dark'] {\n";
                for(let k in data.dark) { cssStr += `  ${k}: ${data.dark[k]};\n`; }
                cssStr += "}";
                styleEl.innerHTML = cssStr;
                document.head.appendChild(styleEl);
            }
        } catch(e) { console.log("خطأ في تطبيق المتغيرات العامة"); }
    }

    async function initDrawer() {
        initUserTheme();
        await loadGlobalVars();
        const loader = document.getElementById("drawerLoader");
        let loadedSuccessfully = false;
        try {
            if (typeof Android !== "undefined" && Android.readLocalFile) {
                const localData = Android.readLocalFile("order.json");
                if (localData && localData.trim() !== "") {
                    const orderedPages = JSON.parse(localData);
                    renderDrawerContent(orderedPages);
                    loadedSuccessfully = true;
                }
            }
            if (!loadedSuccessfully) {
                const res = await fetch(`order.json`);
                if (res.ok) {
                    const orderedPages = await res.json();
                    renderDrawerContent(orderedPages);
                    loadedSuccessfully = true;
                } else { throw new Error(); }
            }
        } catch(e) { 
            if (!loadedSuccessfully) {
                try {
                    const resAlt = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/order.json`);
                    const dataAlt = await resAlt.json();
                    const decodedContent = decodeURIComponent(escape(atob(dataAlt.content.replace(/\s/g, ""))));
                    renderDrawerContent(JSON.parse(decodedContent));
                } catch(err) { console.log("خطأ في جلب الهيدر"); }
            }
        } finally {
            if(loader) loader.style.display = "none";
        }
    }
    initDrawer();
</script>
</body>
</html>
